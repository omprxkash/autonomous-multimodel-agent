    <polyline points="17,18 35,40 17,62"/>
    <polyline points="63,18 45,40 63,62"/>
  </g>
  <circle cx="40" cy="40" r="6" fill="#0E2A47"/>
  <!-- Wordmark -->
  <text x="98" y="52" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="34" letter-spacing="0.2" fill="#0E2A47">ReconStock</text>
</svg>
