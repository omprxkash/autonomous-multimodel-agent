<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <title>ReconStock — Candidate 6: Chevron Interlock</title>
  <!-- Mark: two-way sync flows (outbound/inbound) that stop and confirm at a locked checkpoint, not a free-running loop. -->
