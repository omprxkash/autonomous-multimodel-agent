<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>failsafe</title><style>
* { margin:0; box-sizing:border-box; }
body { width:1280px; height:720px; background:#0E2A47; display:flex; align-items:center; justify-content:center; overflow:hidden;
  font-family:"Segoe UI",-apple-system,Arial,sans-serif; }
.wrap { max-width:940px; padding:0 60px; text-align:center; }
.l1 { color:#8FA3B8; font-size:34px; font-weight:600; line-height:1.35;
  opacity:0; animation:up .8s ease .3s forwards; }
.l2 { color:#fff; font-size:44px; font-weight:700; line-height:1.3; margin-top:26px; letter-spacing:-.4px;
  opacity:0; animation:up .8s ease 1.6s forwards; }
.l2 em { color:#4ADE80; font-style:normal; }
@keyframes up { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }
</style></head><body>
<div class="wrap">
  <div class="l1">We don't promise a sync that never fails.</div>
  <div class="l2">We promise one that <em>fails safe</em> — and is <em>fully reversible</em>.</div>
</div>
</body></html>
