<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>hook</title><style>
* { margin:0; box-sizing:border-box; }
body { width:1280px; height:720px; background:#0E2A47; display:flex; align-items:center; justify-content:center; overflow:hidden;
  font-family:"Segoe UI",-apple-system,Arial,sans-serif; }
.wrap { max-width:900px; padding:0 60px; }
.time { font-family:ui-monospace,Consolas,monospace; color:#8FA3B8; font-size:26px; letter-spacing:2px; margin-bottom:26px;
  opacity:0; animation:up .7s ease .2s forwards; }
h1 { color:#fff; font-size:52px; font-weight:700; line-height:1.25; letter-spacing:-.5px;
  opacity:0; animation:up .7s ease .6s forwards; }
h1 .n { color:#F87171; font-family:ui-monospace,Consolas,monospace; }
.then { color:#4ADE80; font-size:30px; font-weight:600; margin-top:34px;
  opacity:0; animation:up .7s ease 1.8s forwards; }
@keyframes up { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
</style></head><body>
<div class="wrap">
  <div class="time">09:12 AM &middot; EU-STORE.MYSHOPIFY.COM</div>
  <h1>An incoming sync just tried to zero <span class="n">2,143</span> SKUs.</h1>
  <div class="then">Here is what didn't happen next.</div>
</div>
</body></html>
