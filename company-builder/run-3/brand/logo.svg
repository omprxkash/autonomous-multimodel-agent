<svg xmlns="http://www.w3.org/2000/svg" width="560" height="120" viewBox="0 0 560 120" role="img" aria-label="WideTally logo">
  <!-- Mark: five tally strokes; the fifth is the diagonal counting stroke, drawn as a pen line -->
  <g transform="translate(18,18)">
    <rect x="0"  y="6" width="9" height="72" rx="4.5" fill="#16324F"/>
    <rect x="20" y="0" width="9" height="78" rx="4.5" fill="#16324F"/>
    <rect x="40" y="8" width="9" height="70" rx="4.5" fill="#16324F"/>
    <rect x="60" y="2" width="9" height="76" rx="4.5" fill="#16324F"/>
    <!-- diagonal tally stroke rendered as a brass pen line with a nib-flick end -->
    <path d="M -6 66 L 74 10 L 78 15 L -2 71 Z" fill="#B8862D"/>
    <path d="M 74 10 L 84 3 L 78 15 Z" fill="#B8862D"/>
  </g>
  <!-- Wordmark -->
  <g font-family="Georgia, 'Iowan Old Style', 'Times New Roman', serif" fill="#16324F">
    <text x="128" y="76" font-size="52" letter-spacing="0.5">Wide<tspan fill="#B8862D">Tally</tspan></text>
  </g>
  <text x="130" y="102" font-family="Segoe UI, system-ui, sans-serif" font-size="15" letter-spacing="3.2" fill="#5B6B7C">EVERY STORE. ONE LEDGER. YOUR MACHINE.</text>
</svg>
