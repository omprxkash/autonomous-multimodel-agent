name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deskpilot/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app/

  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deskpilot/backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: deskpilot
          POSTGRES_PASSWORD: deskpilot
          POSTGRES_DB: deskpilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://deskpilot:deskpilot@localhost:5432/deskpilot_test
      GOOGLE_CLIENT_ID: test
      GOOGLE_CLIENT_SECRET: test
      GEMINI_API_KEY: test
      SECRET_KEY: test-secret-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - run: pytest tests/ -v --tb=short || true

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deskpilot/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: deskpilot/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint || true

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deskpilot/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: deskpilot/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
