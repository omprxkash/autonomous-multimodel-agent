name: mail-phis tests

on:
  push:
    paths:
      - 'mail-phis/**'
  pull_request:
    paths:
      - 'mail-phis/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mail-phis/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v
        env:
          PYTHONPATH: .
